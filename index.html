<script>
    // Inisialisasi API Speech Recognition
const micBtn = document.getElementById('micBtn');
const output = document.getElementById('output');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'id-ID';
recognition.continuous = true; // Mode mendengarkan terus

// Fungsi untuk mematikan sementara pengenalan suara
function pauseRecognition() {
    recognition.stop();
}

// Fungsi untuk menghidupkan kembali pengenalan suara
function resumeRecognition() {
    recognition.start();
}

// Inisialisasi Text-to-Speech (TTS)
function speak(text) {
    pauseRecognition(); // Hentikan pengenalan suara sementara
    const speech = new SpeechSynthesisUtterance();
    speech.lang = 'id-ID';
    speech.text = text;
    speech.pitch = 1;
    speech.rate = 1;
    window.speechSynthesis.speak(speech);
    // Hidupkan kembali pengenalan suara setelah TTS selesai
    speech.onend = function () {
        resumeRecognition();
    };
}

// Fungsi untuk memutar musik
const audio = document.getElementById('myAudio'); // Ambil elemen audio
function playMusic() {
    if (!audio.paused) {
        return; // Musik sudah diputar, jangan interrupt
    }
    audio.play(); // Memulai musik
    output.textContent = 'Memutar musik...';
}

function stopMusic() {
    audio.pause(); // Menghentikan musik
    audio.currentTime = 0; // Reset waktu ke awal
    speak('Musik dihentikan.');
    output.textContent = 'Musik dihentikan.';
}

// Fungsi untuk menampilkan cuaca dengan API
function weatherToday() {
    const apiKey = 'e7f8e1a09e2c04b45e5d7a1e0ebe4424'; // Ganti dengan API key kamu
    const city = 'Rantau Prapat'; // Ganti dengan kota yang diinginkan
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=id`;
    console.log('Fetching weather data...'); // Log untuk memeriksa apakah permintaan dikirim
    fetch(url)
        .then(response => {
            console.log('Response status:', response.status); // Log status respons
            // Cek apakah respons berhasil (status 200)
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            console.log('Weather data received:', data); // Log data cuaca
            const weather = `Cuaca di ${data.name} saat ini: ${data.weather[0].description}, suhu sekitar ${data.main.temp}°C, dengan kelembaban ${data.main.humidity}% dan kecepatan angin ${data.wind.speed} m/s.`;
            speak(weather);
            output.textContent = weather;
        })
        .catch(error => {
            console.error('Error fetching weather:', error); // Log error lebih mendetail
            speak('Maaf, Sindi tidak bisa mendapatkan informasi cuaca saat ini.');
            output.textContent = `Error mendapatkan cuaca: ${error.message}`;
        });
}

// Fungsi untuk menyediakan berita terkini menggunakan API
function latestNews() {
    const apiKey = '41fe65e568cb4e2d9511ec74f4b7fd56'; // API Key terbaru
    const country = 'Indonesia'; // Ganti dengan negara yang diinginkan
    const url = `https://newsapi.org/v2/top-headlines?q=${country}&category=technology&apiKey=${apiKey}`; // Mengambil berita dari Indonesia dengan kategori teknologi
    fetch(url)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            if (data.articles && data.articles.length > 0) {
                const newsItem = data.articles[0]; // Mengambil artikel berita pertama
                const news = `Berita terkini: ${newsItem.title}. ${newsItem.description}`;
                speak(news);
                output.textContent = news;
            } else {
                speak('Tidak ada berita terkini saat ini.');
                output.textContent = 'Tidak ada berita terkini saat ini.';
            }
        })
        .catch(error => {
            console.error('Error fetching news:', error);
            speak('Maaf, Sindi tidak bisa mendapatkan berita terkini saat ini.');
            output.textContent = `Error mendapatkan berita: ${error.message}`;
        });
}
